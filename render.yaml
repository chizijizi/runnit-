databases:
  - name: runnit-db
    databaseName: runnit
    plan: free
    region: frankfurt

services:
  - type: web
    name: runnit-api
    region: frankfurt
    plan: free
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: runnit-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_ORIGINS
        value: "*"
